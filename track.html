<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - BD SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary:#FF6B35;
    --primary-dark:#E85A1A;
    --accent:#FFA500;
    --danger:#ef4444;
    --success:#16a34a;
    --warning:#f59e0b;
    --info:#6366f1;
    --gradient:linear-gradient(135deg,#FF6B35 0%,#FFA500 100%);
    --bg:#FFF8F3;
    --card:rgba(255,255,255,0.8);
    --text:#1A1A1A;
    --muted:#64748B;
    --border:#FFE4D6;
    --shadow:0 25px 70px rgba(255,107,53,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Bengali',sans-serif;}
body{
    background:linear-gradient(135deg,#FFF8F3 0%,#FFE4D6 50%,#FFF0E6 100%);
    padding:20px;min-height:100vh;
}

.container{max-width:950px;margin:40px auto;}

/* Glass Card Premium */
.card{
    background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    border-radius:35px;padding:50px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.5);
}
h1{
    text-align:center;font-weight:900;margin-bottom:35px;font-size:36px;
    background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    animation:shine 3s infinite;
}
@keyframes shine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Search Box Premium Orange */
.search-box{display:flex;gap:15px;margin-bottom:40px;}
.search-box input{
    flex:1;padding:20px 24px;border:3px solid var(--border);border-radius:20px;font-size:16px;
    background:rgba(255,255,255,0.9);transition:.3s;font-weight:700;box-shadow:0 5px 20px rgba(255,107,53,0.1);
}
.search-box input:focus{
    border-color:var(--primary);outline:none;box-shadow:0 0 0 5px rgba(255,107,53,.2);background:#fff;
}
.search-box button{
    padding:20px 35px;background:var(--gradient);border:none;border-radius:20px;color:#fff;
    font-weight:900;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:12px;
    box-shadow:0 12px 35px rgba(255,107,53,.4);
}
.search-box button:hover{
    transform:translateY(-4px) scale(1.03);box-shadow:0 18px 50px rgba(255,107,53,.5);
}

/* Result */
.result{display:none;animation:slideUp.6s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.order-header{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:35px;
    padding:25px;background:linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,165,0,0.1));
    border-radius:25px;border:2px solid rgba(255,107,53,0.2);
}
.order-id{font-size:26px;font-weight:900;color:var(--text);}
.order-id span{
    color:var(--primary);background:rgba(255,107,53,0.15);padding:6px 14px;border-radius:12px;
}

/* Status Badge Premium Orange */
.status-badge{
    padding:14px 26px;border-radius:18px;font-weight:900;color:#fff;font-size:13px;
    text-transform:uppercase;letter-spacing:1.5px;box-shadow:0 8px 25px rgba(0,0,0,.15);
    animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Status Colors Orange Theme */
.status-New{background:var(--gradient);}
.status-Confirmed{background:linear-gradient(135deg,#6366f1,#4f46e5);}
.status-Shipping{background:linear-gradient(135deg,#FFA500,#FF8C00);}
.status-Delivered{background:linear-gradient(135deg,#16a34a,#15803d);}
.status-Cancelled{background:linear-gradient(135deg,#ef4444,#dc2626);}

/* Tracking Steps Premium with Progress Line */
.track-wrapper{
    padding:35px;background:rgba(255,248,243,0.7);border-radius:30px;margin:35px 0;
    border:2px solid var(--border);
}
.track-steps{display:flex;justify-content:space-between;margin:0;position:relative;}
.track-steps::before{
    content:'';position:absolute;top:28px;left:8%;right:8%;height:6px;
    background:linear-gradient(90deg,#FFE4D6,#FFD4B8);z-index:1;border-radius:10px;
}
.progress-line{
    position:absolute;top:28px;left:8%;height:6px;background:var(--gradient);
    z-index:2;border-radius:10px;transition:width 0.8s ease;
}
.step{text-align:center;position:relative;z-index:3;flex:1;}
.step-icon{
    width:56px;height:56px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
    margin:0 auto 15px;color:#94a3b8;font-size:22px;transition:.4s;border:5px solid #FFE4D6;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}
.step.active.step-icon{
    background:var(--gradient);color:#fff;transform:scale(1.3);border-color:#fff;
    box-shadow:0 0 40px rgba(255,107,53,.6);animation:bounce 1.2s infinite;
}
.step.done.step-icon{
    background:var(--gradient);color:#fff;border-color:#fff;box-shadow:0 0 30px rgba(255,107,53,.5);
}
.step.cancel.step-icon{
    background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border-color:#fff;
    box-shadow:0 0 30px rgba(239,68,68,.5);
}
@keyframes bounce{0%,100%{transform:scale(1.3)}50%{transform:scale(1.4)}}
.step p{font-size:14px;color:var(--muted);font-weight:800;}
.step.active p{color:var(--primary);font-weight:900;font-size:15px;}

/* Info Grid Premium */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:35px;}
.info-item{
    background:linear-gradient(135deg,rgba(255,248,243,0.9),rgba(255,255,255,0.9));
    padding:22px;border-radius:20px;border:2px solid var(--border);transition:.3s;
}
.info-item:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(255,107,53,.15);}
.info-item label{
    font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1.2px;
}
.info-item p{font-weight:900;margin-top:10px;color:var(--text);font-size:17px;}

/* Products Premium */
.products-section{margin-top:35px;padding-top:30px;border-top:3px dashed var(--border);}
.products-section h3{font-weight:900;margin-bottom:20px;font-size:20px;color:var(--text);}
.product-row{
    display:flex;gap:20px;padding:20px 0;border-bottom:2px solid rgba(255,228,214,0.6);
    align-items:center;transition:.3s;border-radius:15px;
}
.product-row:hover{background:rgba(255,248,243,0.7);padding-left:15px;}
.product-row:last-child{border:none;}
.product-row img{
    width:70px;height:70px;border-radius:18px;object-fit:cover;border:4px solid var(--border);
    box-shadow:0 5px 15px rgba(255,107,53,0.15);
}
.product-row h4{font-size:16px;font-weight:800;margin-bottom:6px;color:var(--text);}
.product-row p{color:var(--primary);font-weight:900;font-size:16px;}

.error-msg{
    text-align:center;color:var(--danger);padding:35px;font-weight:800;
    background:linear-gradient(135deg,#fef2f2,#fee2e2);border-radius:20px;
    border:3px solid rgba(239,68,68,0.2);font-size:16px;
}
.loading{text-align:center;padding:60px;color:var(--primary);font-weight:900;font-size:18px;}
.loading i{font-size:50px;margin-bottom:20px;animation:spin 1s linear infinite;color:var(--primary);}
@keyframes spin{100%{transform:rotate(360deg);}}

@media(max-width:600px){
 .card{padding:30px 20px;}
 .info-grid{grid-template-columns:1fr;}
 .track-steps p{font-size:11px;}
 .track-steps::before{left:10%;right:10%;}
 .progress-line{left:10%;}
 .search-box{flex-direction:column;}
   h1{font-size:26px;}
  .order-header{flex-direction:column;gap:15px;text-align:center;}
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1><i class="fa-solid fa-truck-fast"></i> Track Your Order</h1>

        <div class="search-box">
            <input type="text" id="orderIdInput" placeholder="Enter Your Order ID: BD12345678">
            <button onclick="trackOrder()"><i class="fa-solid fa-magnifying-glass"></i> Track Order</button>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <i class="fa-solid fa-spinner"></i>
            <p>Fetching Order Details...</p>
        </div>
        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <!-- Result -->
        <div class="result" id="resultBox">
            <div class="order-header">
                <div class="order-id">Order ID: <span id="orderIdShow"></span></div>
                <div class="status-badge" id="statusBadge"></div>
            </div>

            <!-- Tracking Steps -->
            <div class="track-wrapper">
                <div class="track-steps" id="trackSteps">
                    <div class="progress-line" id="progressLine"></div>
                </div>
            </div>

            <!-- Info -->
            <div class="info-grid">
                <div class="info-item">
                    <label>Customer Name</label>
                    <p id="customerName"></p>
                </div>
                <div class="info-item">
                    <label>Phone Number</label>
                    <p id="customerPhone"></p>
                </div>
                <div class="info-item">
                    <label>Delivery Address</label>
                    <p id="customerAddress"></p>
                </div>
                <div class="info-item">
                    <label>Total Amount</label>
                    <p id="totalAmount"></p>
                </div>
            </div>

            <!-- Products -->
            <div class="products-section">
                <h3><i class="fa-solid fa-bag-shopping"></i> Ordered Products</h3>
                <div class="products-list" id="productsList"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const steps = [
    {name: "New", icon: "fa-solid fa-file-invoice"},
    {name: "Confirmed", icon: "fa-solid fa-check-double"},
    {name: "Shipping", icon: "fa-solid fa-truck"},
    {name: "Delivered", icon: "fa-solid fa-box-open"},
    {name: "Cancelled", icon: "fa-solid fa-xmark"}
];

window.trackOrder = async () => {
    const orderId = document.getElementById('orderIdInput').value.trim();
    if(!orderId){ alert("Please enter Order ID"); return; }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';

    const q = query(collection(db, "orders"), where("orderId", "==", orderId));
    const snap = await getDocs(q);

    document.getElementById('loading').style.display = 'none';

    if(snap.empty){
        document.getElementById('errorMsg').innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Order ID not found. Please check and try again.';
        document.getElementById('errorMsg').style.display = 'block';
        return;
    }

    const order = snap.docs[0].data();
    showResult(order);
}

function showResult(order){
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('orderIdShow').innerText = order.orderId;

    const statusEl = document.getElementById('statusBadge');
    statusEl.innerText = order.status;
    statusEl.className = 'status-badge status-' + order.status;

    const stepsDiv = document.getElementById('trackSteps');
    const progressLine = document.getElementById('progressLine');
    const currentStepIndex = steps.findIndex(s => s.name == order.status);

    let stepsHTML = '';
    let progressWidth = '0%';

    if(order.status == 'Cancelled'){
        progressWidth = '100%';
        stepsHTML = steps.map((s, i) => `
            <div class="step cancel">
                <div class="step-icon"><i class="${s.icon}"></i></div>
                <p>${s.name}</p>
            </div>
        `).join('');
    } else {
        progressWidth = currentStepIndex >= 0? `${(currentStepIndex / (steps.length - 2)) * 84 + 8}%` : '8%';
        stepsHTML = steps.map((s, i) => `
            <div class="step ${i < currentStepIndex? 'done' : ''} ${i == currentStepIndex? 'active' : ''}">
                <div class="step-icon"><i class="${s.icon}"></i></div>
                <p>${s.name}</p>
            </div>
        `).join('');
    }

    stepsDiv.innerHTML = `<div class="progress-line" id="progressLine" style="width:${progressWidth}"></div>` + stepsHTML;

    document.getElementById('customerName').innerText = order.name || '';
    document.getElementById('customerPhone').innerText = order.phone || '';
    document.getElementById('customerAddress').innerText = `${order.address || ''}, ${order.thana || ''}, ${order.district || ''}, ${order.division || ''}`;
    document.getElementById('totalAmount').innerText = '৳' + (order.total || 0).toFixed(2);

    const productsDiv = document.getElementById('productsList');
    productsDiv.innerHTML = order.items.map(item => `
        <div class="product-row">
            <img src="${item.images?.[0] || item.image}">
            <div>
                <h4>${item.name}</h4>
                <p>৳${item.price || item.currentPrice} × ${item.qty}</p>
            </div>
        </div>
    `).join('');
}

const urlParams = new URLSearchParams(window.location.search);
const idFromUrl = urlParams.get('id');
if(idFromUrl){
    document.getElementById('orderIdInput').value = idFromUrl;
    trackOrder();
}
</script>
</body>
</html>

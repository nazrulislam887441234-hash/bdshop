<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - HUTBAZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #2563eb; 
            --accent: #16a34a;
            --gradient: linear-gradient(135deg,#2563eb,#1e40af);
            --bg: #f8fafc; 
            --card: #ffffff; 
            --text: #1e293b; 
            --border: #dbeafe;
            --shadow: 0 10px 40px rgba(37,99,235,0.1);
        }
        [data-theme="dark"] { 
            --primary: #3b82f6; 
            --accent: #22c55e;
            --gradient: linear-gradient(135deg,#3b82f6,#2563eb);
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --border: #334155;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); }

        /* Theme Toggle */
        .theme-toggle { 
            position: fixed; top: 20px; right: 20px; z-index: 1000; cursor: pointer; 
            background: var(--card); padding: 12px 14px; border-radius: 50%; 
            box-shadow: var(--shadow); border: 2px solid var(--border);
        }
        .theme-toggle:hover { transform: rotate(180deg) scale(1.1); }

        /* Hero */
        .hero { 
            background: var(--gradient); padding: 90px 20px; text-align: center; color: white; 
            position: relative; overflow: hidden;
        }
        .hero::after{
            content:''; position:absolute; bottom:0; left:0; width:100%; height:60px;
            background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120"><path fill="%23f8fafc" d="M0,64L48,80C96,96,192,128,288,128C384,128,480,96,576,90.7C672,85,768,107,864,112C960,117,1056,107,1152,96C1248,85,1344,75,1392,69.3L1440,64L1440,120L1392,120C1344,120,1248,120,1152,120C1056,120,960,120,864,120C768,120,672,120,576,120C480,120,384,120,288,120C192,120,96,120,48,120L0,120Z"></path></svg>') no-repeat bottom;
            background-size:cover;
        }
        [data-theme="dark"] .hero::after{ background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120"><path fill="%230f172a" d="M0,64L48,80C96,96,192,128,288,128C384,128,480,96,576,90.7C672,85,768,107,864,112C960,117,1056,107,1152,96C1248,85,1344,75,1392,69.3L1440,64L1440,120L1392,120C1344,120,1248,120,1152,120C1056,120,960,120,864,120C768,120,672,120,576,120C480,120,384,120,288,120C192,120,96,120,48,120L0,120Z"></path></svg>') no-repeat bottom; background-size:cover; }
        .hero h1 { font-size: 42px; font-weight: 900; margin-bottom: 10px; }
        .hero p { font-size: 18px; opacity: 0.95; font-weight: 500; }

        .container { max-width: 1000px; margin: -50px auto 80px; padding: 20px; }

        /* Contact Cards */
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .contact-card { 
            background: var(--card); padding: 35px; border-radius: 22px; text-align: center; 
            box-shadow: var(--shadow); border: 2px solid var(--border); text-decoration: none; 
            color: var(--text); display: block; position: relative; overflow: hidden;
        }
        .contact-card::before{
            content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:var(--gradient);
        }
        .contact-card:hover { transform: translateY(-10px); box-shadow: 0 25px 60px rgba(37,99,235,0.2); }
        .icon { font-size: 35px; color: var(--primary); margin-bottom: 15px; }
        .contact-card h3 { margin-bottom: 8px; font-weight: 800; font-size: 18px; }
        .contact-card p { font-weight: 700; color: var(--primary); font-size: 15px; }

        /* Form Box */
        .form-box { 
            background: var(--card); padding: 45px; border-radius: 25px; 
            box-shadow: var(--shadow); border: 2px solid var(--border);
        }
        .form-box h2 { font-size: 24px; font-weight: 900; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 18px; }
        .input-group label { font-weight: 700; font-size: 14px; margin-bottom: 8px; display: block; }
        input, textarea { 
            width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: 14px; 
            background: transparent; color: var(--text); font-weight: 600; font-size: 15px;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .btn-submit { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            background: var(--gradient); color: white; font-weight: 800; cursor: pointer; 
            margin-top: 15px; font-size: 16px; box-shadow: 0 8px 25px rgba(37,99,235,0.3);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(37,99,235,0.4); }

        /* Footer */
        footer{text-align:center;padding:30px 20px;color:#64748b;font-weight:600;}
    </style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="themeIcon"></i></div>

<div class="hero">
    <h1>Contact Us</h1>
    <p>We're here to help with any questions you have</p>
</div>

<div class="container">
    <div class="contact-grid">
        <!-- Call -->
        <a href="tel:+96569085197" class="contact-card">
            <div class="icon"><i class="fa-solid fa-phone"></i></div>
            <h3>Call Us</h3>
            <p>01723109294</p>
        </a>
        <!-- WhatsApp -->
        <a href="https://wa.me/96569085197" target="_blank" class="contact-card">
            <div class="icon"><i class="fa-brands fa-whatsapp"></i></div>
            <h3>WhatsApp</h3>
            <p>96569085197</p>
        </a>
        <!-- Email -->
        <a href="mailto:hutbazbd@gmail.com" class="contact-card">
            <div class="icon"><i class="fa-solid fa-envelope"></i></div>
            <h3>Email</h3>
            <p>hutbazbd@gmail.com</p>
        </a>
    </div>

    <div class="form-box">
        <h2><i class="fa-solid fa-paper-plane"></i> Send us a Message</h2>
        <form onsubmit="sendMessage(event)">
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label>Subject</label>
                <input type="text" id="subject" placeholder="What's this about?">
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            <button class="btn-submit"><i class="fa-brands fa-whatsapp"></i> Send via WhatsApp</button>
        </form>
    </div>
</div>

<footer>© <span id="year"></span> HUTBAZ. All Rights Reserved.</footer>

<script>
    // Theme Toggle with Icon Change
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('themeIcon');
        if(html.getAttribute('data-theme') === 'dark') {
            html.setAttribute('data-theme', 'light');
            icon.className = 'fa-solid fa-moon';
        } else {
            html.setAttribute('data-theme', 'dark');
            icon.className = 'fa-solid fa-sun';
        }
    }

    // Send to WhatsApp
    function sendMessage(e){
        e.preventDefault();
        const name = document.getElementById('name').value;
        const msg = document.getElementById('message').value;
        const subject = document.getElementById('subject').value;
        const text = `*New Message from HUTBAZ*%0A%0A*Name:* ${name}%0A*Subject:* ${subject}%0A*Message:* ${msg}`;
        window.open(`https://wa.me/96569085197?text=${text}`, '_blank');
    }

    document.getElementById('year').innerText = new Date().getFullYear();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Product - HUTBAZ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#16a34a;--warning:#fbbf24;--danger:#ef4444;--gradient:linear-gradient(135deg,#2563eb,#1e40af);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}
body{background:#f8fafc;padding-bottom:100px;}

/* Header */
.header{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(37,99,235,.08);z-index:100;}
.back-btn{font-size:22px;color:var(--primary);}
.cart-btn{position:relative;font-size:22px;color:var(--primary);}
.cart-count{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;font-size:11px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;}

.container{max-width:1200px;margin:0 auto;padding:20px;}

/* Product Section */
.product-wrapper{display:grid;grid-template-columns:1fr;gap:30px;}
@media(min-width:992px){.product-wrapper{grid-template-columns:1fr 1fr;}}

/* Image Gallery */
.gallery{background:#fff;border-radius:25px;padding:20px;box-shadow:0 10px 40px rgba(37,99,235,.1);}
.main-img{width:100%;aspect-ratio:1/1;border-radius:20px;object-fit:cover;margin-bottom:15px;}
.thumbs{display:flex;gap:10px;overflow-x:auto;}
.thumbs img{width:70px;height:70px;border-radius:12px;object-fit:cover;cursor:pointer;border:3px solid transparent;transition:.3s;}
.thumbs img.active{border-color:var(--primary);}

/* Product Info */
.info{background:#fff;border-radius:25px;padding:30px;box-shadow:0 10px 40px rgba(37,99,235,.1);}
.info h1{font-size:26px;font-weight:900;margin-bottom:12px;color:#1e293b;}
.rating{display:flex;align-items:center;gap:10px;margin-bottom:15px;}
.stars{color:var(--warning);}
.price-wrap{display:flex;align-items:center;gap:15px;margin:20px 0;}
.current-price{font-size:32px;font-weight:900;color:var(--accent);}
.old-price{font-size:18px;color:#94a3b8;text-decoration:line-through;font-weight:700;}
.stock{color:var(--accent);font-weight:700;margin-bottom:20px;}
.desc{color:#64748b;line-height:1.8;margin-bottom:25px;}

/* Buttons */
.btn-group{display:flex;gap:12px;margin-bottom:25px;}
.btn{flex:1;padding:16px;border:none;border-radius:15px;font-weight:800;font-size:16px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-cart{background:var(--gradient);color:#fff;box-shadow:0 8px 25px rgba(37,99,235,.3);}
.btn-cart:hover{transform:translateY(-3px);}
.btn-buy{background:var(--accent);color:#fff;}

/* Reviews Section */
.reviews{background:#fff;border-radius:25px;padding:30px;margin-top:25px;box-shadow:0 10px 40px rgba(37,99,235,.1);}
.reviews h2{font-size:22px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}

/* Add Review Form */
.review-form{margin-bottom:30px;padding:20px;background:#eff6ff;border-radius:18px;}
.review-form h3{font-size:16px;margin-bottom:12px;}
.stars-input{display:flex;gap:8px;font-size:28px;color:#cbd5e1;margin-bottom:12px;cursor:pointer;}
.stars-input i.active{color:var(--warning);}
.review-form textarea{width:100%;padding:14px;border:2px solid #dbeafe;border-radius:12px;margin-bottom:12px;font-family:'Poppins';resize:vertical;}
.review-form button{padding:12px 25px;background:var(--gradient);color:#fff;border:none;border-radius:12px;font-weight:800;cursor:pointer;}

/* Review List */
.review-item{border-bottom:1px solid #f1f5f9;padding:18px 0;}
.review-item:last-child{border:none;}
.review-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.review-user{font-weight:800;}
.review-date{font-size:12px;color:#94a3b8;}
.review-stars{color:var(--warning);margin-bottom:6px;}
.review-text{color:#475569;line-height:1.7;}

.loading{text-align:center;padding:80px;color:var(--primary);font-weight:800;font-size:18px;}

/* Sticky Add to Cart Mobile */
.sticky-cart{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px 20px;box-shadow:0 -5px 30px rgba(0,0,0,.1);display:flex;gap:12px;z-index:99;}
@media(min-width:992px){.sticky-cart{display:none;}}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <a href="cart.html" class="cart-btn">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-count" id="cartCount">0</span>
    </a>
</div>

<div class="container">
    <div id="loading" class="loading"><i class="fa-solid fa-spinner fa-spin"></i><br>Loading Product...</div>

    <div id="productContent" style="display:none;">
        <div class="product-wrapper">
            <!-- Gallery -->
            <div class="gallery">
                <img src="" id="mainImg" class="main-img">
                <div class="thumbs" id="thumbs"></div>
            </div>

            <!-- Info -->
            <div class="info">
                <h1 id="prodName"></h1>

                <div class="rating">
                    <div class="stars" id="avgStars"></div>
                    <span id="reviewCount">0 Reviews</span>
                </div>

                <div class="price-wrap">
                    <div class="current-price" id="currentPrice"></div>
                    <div class="old-price" id="oldPrice"></div>
                </div>

                <div class="stock"><i class="fa-solid fa-check-circle"></i> In Stock</div>
                <p class="desc" id="prodDesc"></p>

                <div class="btn-group">
                    <button class="btn btn-cart" onclick="addToCart()"><i class="fa-solid fa-cart-plus"></i> Add to Cart</button>
                    <button class="btn btn-buy" onclick="buyNow()"><i class="fa-solid fa-bolt"></i> Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Reviews -->
        <div class="reviews">
            <h2><i class="fa-solid fa-star"></i> Customer Reviews</h2>

            <!-- Add Review Form -->
            <div class="review-form">
                <h3>Write a Review</h3>
                <div class="stars-input" id="starInput">
                    <i class="fa-solid fa-star" data-rate="1"></i>
                    <i class="fa-solid fa-star" data-rate="2"></i>
                    <i class="fa-solid fa-star" data-rate="3"></i>
                    <i class="fa-solid fa-star" data-rate="4"></i>
                    <i class="fa-solid fa-star" data-rate="5"></i>
                </div>
                <textarea id="reviewText" rows="3" placeholder="Share your experience with this product..."></textarea>
                <button onclick="submitReview()">Submit Review</button>
            </div>

            <!-- Review List -->
            <div id="reviewList"></div>
        </div>
    </div>
</div>

<!-- Sticky Cart Mobile -->
<div class="sticky-cart">
    <button class="btn btn-cart" onclick="addToCart()" style="flex:2;"><i class="fa-solid fa-cart-plus"></i> Add to Cart</button>
    <button class="btn btn-buy" onclick="buyNow()" style="flex:1;"><i class="fa-solid fa-bolt"></i></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentProduct = null;
let selectedRating = 0;

// Get Product ID from URL
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

async function loadProduct(){
    if(!productId){
        document.getElementById('loading').innerHTML = "❌ Product Not Found";
        return;
    }

    const docRef = doc(db, "products", productId);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){
        document.getElementById('loading').innerHTML = "❌ Product Not Found";
        return;
    }

    currentProduct = {id: docSnap.id,...docSnap.data()};
    renderProduct();
    loadReviews();
    updateCartCount();
}

function renderProduct(){
    const p = currentProduct;
    document.getElementById('pageTitle').innerText = p.name + ' - HUTBAZ';
    document.getElementById('prodName').innerText = p.name;
    document.getElementById('prodDesc').innerText = p.description || 'No description available';
    document.getElementById('currentPrice').innerText = '৳' + Number(p.currentPrice).toFixed(2);
    document.getElementById('oldPrice').innerText = p.oldPrice? '৳' + Number(p.oldPrice).toFixed(2) : '';

    // Images
    const images = p.images || [p.image];
    document.getElementById('mainImg').src = images[0];
    document.getElementById('thumbs').innerHTML = images.map((img,i) =>
        `<img src="${img}" class="${i==0?'active':''}" onclick="changeImg(this,'${img}')">`
    ).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('productContent').style.display = 'block';
}

window.changeImg = (el, src) => {
    document.getElementById('mainImg').src = src;
    document.querySelectorAll('.thumbs img').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

// Cart Functions
window.addToCart = () => {
    let cart = JSON.parse(localStorage.getItem('hutbaz_cart')) || [];
    const existing = cart.find(item => item.id === currentProduct.id);
    if(existing){ existing.qty += 1; }
    else { cart.push({...currentProduct, qty: 1}); }
    localStorage.setItem('hutbaz_cart', JSON.stringify(cart));
    alert(`✅ ${currentProduct.name} added to cart`);
    updateCartCount();
}

window.buyNow = () => {
    addToCart();
    window.location.href = 'checkout.html';
}

function updateCartCount(){
    const cart = JSON.parse(localStorage.getItem('hutbaz_cart')) || [];
    const total = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById('cartCount').innerText = total;
}

// Review System - LocalStorage
const starInput = document.getElementById('starInput');
starInput.querySelectorAll('i').forEach(star => {
    star.onclick = () => {
        selectedRating = parseInt(star.dataset.rate);
        starInput.querySelectorAll('i').forEach((s,i) => {
            s.classList.toggle('active', i < selectedRating);
        });
    }
});

window.submitReview = () => {
    if(selectedRating == 0){ alert("Please select rating"); return; }
    const text = document.getElementById('reviewText').value.trim();
    if(!text){ alert("Please write a review"); return; }

    const reviews = JSON.parse(localStorage.getItem(`hutbaz_reviews_${productId}`)) || [];
    reviews.push({
        rating: selectedRating,
        text: text,
        date: new Date().toISOString(),
        user: 'Guest User'
    });
    localStorage.setItem(`hutbaz_reviews_${productId}`, JSON.stringify(reviews));

    document.getElementById('reviewText').value = '';
    selectedRating = 0;
    starInput.querySelectorAll('i').forEach(s => s.classList.remove('active'));
    loadReviews();
    alert("✅ Review Submitted");
}

function loadReviews(){
    const reviews = JSON.parse(localStorage.getItem(`hutbaz_reviews_${productId}`)) || [];
    const list = document.getElementById('reviewList');

    if(reviews.length == 0){
        list.innerHTML = '<p style="text-align:center;color:#94a3b8;">No reviews yet. Be the first to review!</p>';
        document.getElementById('reviewCount').innerText = '0 Reviews';
        document.getElementById('avgStars').innerHTML = '';
        return;
    }

    // Avg Rating
    const avg = reviews.reduce((sum,r) => sum + r.rating, 0) / reviews.length;
    document.getElementById('reviewCount').innerText = `${reviews.length} Reviews`;
    document.getElementById('avgStars').innerHTML = '★'.repeat(Math.round(avg)) + '☆'.repeat(5-Math.round(avg));

    // List Reviews
    list.innerHTML = reviews.reverse().map(r => `
        <div class="review-item">
            <div class="review-header">
                <div class="review-user">${r.user}</div>
                <div class="review-date">${new Date(r.date).toLocaleDateString()}</div>
            </div>
            <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
            <div class="review-text">${r.text}</div>
        </div>
    `).join('');
}

loadProduct();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products - BD SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary:#FF6B35;
    --primary-dark:#E85A1A;
    --accent:#FFA500;
    --danger:#ef4444;
    --warning:#FFA500;
    --success:#16a34a;
    --gradient:linear-gradient(135deg,#FF6B35 0%,#FFA500 100%);
    --bg:#FFF8F3;
    --card:rgba(255,255,255,0.95);
    --text:#1A1A1A;
    --muted:#64748B;
    --border:#FFE4D6;
    --shadow:0 15px 50px rgba(255,107,53,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Bengali',sans-serif;}
body{background:linear-gradient(180deg,#FFF8F3 0%,#FFE4D6 100%);min-height:100vh;padding-bottom:50px;}
.container{max-width:1600px;margin:0 auto;padding:20px;}

/* Header Premium Glass */
.header-box{
    background:rgba(255,255,255,0.85);backdrop-filter:blur(30px);padding:35px;border-radius:30px;
    margin-bottom:30px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.5);
}
.header-title{display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:22px;}
.header-title i{font-size:40px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-title h1{
    font-size:32px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.search-box{position:relative;max-width:650px;margin:0 auto;}
.search-box input{
    width:100%;padding:20px 60px 20px 25px;border:3px solid var(--border);border-radius:20px;font-size:16px;
    background:#fff;font-weight:700;transition:.3s;box-shadow:0 8px 25px rgba(255,107,53,0.1);
}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(255,107,53,.2);}
.search-box i{
    position:absolute;right:25px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:22px;
}

/* Product Grid - 6 Columns */
.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
}
@media (min-width:640px){.grid{grid-template-columns:repeat(3, 1fr);}}
@media (min-width:768px){.grid{grid-template-columns:repeat(4, 1fr);}}
@media (min-width:1024px){.grid{grid-template-columns:repeat(5, 1fr);}}
@media (min-width:1280px){.grid{grid-template-columns:repeat(6, 1fr);gap:25px;}}

.card{
    background:var(--card);backdrop-filter:blur(15px);border-radius:25px;padding:16px;
    box-shadow:0 10px 40px rgba(255,107,53,0.1);transition:.4s cubic-bezier(.22,1,.36,1);
    cursor:pointer;display:flex;flex-direction:column;border:2px solid transparent;position:relative;
}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 25px 60px rgba(255,107,53,.25);border-color:var(--primary);}
.card img{
    width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:20px;margin-bottom:12px;transition:.4s;
    border:3px solid var(--border);
}
.card:hover img{transform:scale(1.08);}
.card h3{font-size:16px;font-weight:800;color:var(--text);height:44px;overflow:hidden;line-height:1.4;margin-bottom:8px;}

/* Review Stars */
.review-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.stars{color:var(--warning);font-size:13px;}
.review-count{font-size:12px;color:var(--muted);font-weight:700;}

.current{font-size:20px;font-weight:900;color:var(--primary);margin-bottom:4px;}
.old{font-size:14px;color:var(--muted);text-decoration:line-through;margin-bottom:5px;font-weight:700;}
.discount-badge{
    font-size:12px;background:linear-gradient(135deg,var(--danger),#dc2626);color:#fff;
    padding:5px 10px;border-radius:10px;font-weight:900;display:inline-block;margin-bottom:6px;width:fit-content;
    box-shadow:0 4px 12px rgba(239,68,68,0.3);
}
.save-text{font-size:12px;color:var(--danger);font-weight:800;margin-bottom:10px;}
.btn-cart{
    width:100%;padding:12px;margin-top:auto;background:var(--gradient);border:none;border-radius:15px;
    color:#fff;font-weight:900;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
    gap:8px;transition:.3s;box-shadow:0 6px 20px rgba(255,107,53,.3);
}
.btn-cart:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(255,107,53,.4);}
.btn-buy{
    width:100%;padding:12px;margin-top:8px;background:var(--success);border:none;border-radius:15px;
    color:#fff;font-weight:900;cursor:pointer;font-size:14px;transition:.3s;box-shadow:0 6px 20px rgba(22,163,74,0.3);
}
.btn-buy:hover{transform:scale(1.05);background:#15803D;}

/* Load More */
.load-more{text-align:center;margin:40px 0;}
.load-more button{
    padding:18px 50px;background:#cbd5e1;border:none;border-radius:18px;color:#fff;font-weight:900;
    font-size:17px;cursor:pointer;transition:.3s;
}
.load-more button.active{background:var(--gradient);box-shadow:0 10px 30px rgba(255,107,53,.4);}
.load-more button:hover:not(:disabled){transform:translateY(-3px);}
.load-more button:disabled{cursor:not-allowed;}
.loading{text-align:center;padding:50px;color:var(--primary);font-weight:900;font-size:20px;}
.loading i{font-size:45px;margin-bottom:20px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* Popup Premium */
.popup{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(15px);
    display:none;align-items:center;justify-content:center;z-index:999;animation:fadeIn .3s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.popup-box{
    background:var(--card);padding:40px;border-radius:30px;text-align:center;max-width:400px;width:90%;
    transform:scale(.9);animation:scaleUp .4s cubic-bezier(.22,1,.36,1);box-shadow:0 30px 90px rgba(0,0,0,.3);
    border:2px solid rgba(255,255,255,0.5);
}
@keyframes scaleUp{to{transform:scale(1);}}
.popup-icon{font-size:70px;margin-bottom:18px;color:var(--success);}
.popup-box h3{margin-bottom:12px;font-size:24px;font-weight:900;color:var(--text);}
.popup-box p{color:var(--muted);margin-bottom:25px;font-weight:700;}
.popup-btn{
    padding:16px 35px;background:var(--gradient);border:none;border-radius:16px;color:#fff;font-weight:900;
    cursor:pointer;font-size:17px;box-shadow:0 8px 25px rgba(255,107,53,.4);transition:.3s;
}
.popup-btn:hover{transform:translateY(-2px);}
</style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div class="header-title">
            <i class="fa-solid fa-bag-shopping"></i>
            <h1>All Products</h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products by name, description...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>

    <div class="grid" id="productGrid"></div>
    
    <div class="loading" id="loading"><i class="fa-solid fa-spinner"></i><br>Loading Products...</div>
    
    <div class="load-more" id="loadMoreBox" style="display:none;">
        <button id="loadMoreBtn" onclick="loadMore()">Load More +</button>
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h3 id="popupTitle">Success!</h3>
        <p id="popupMsg">Added to cart</p>
        <button class="popup-btn" onclick="closePopup()">Continue Shopping</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];
let displayedProducts = [];
let currentIndex = 0;
const PER_PAGE = 24; // Increased for 6 columns

const grid = document.getElementById('productGrid');
const loading = document.getElementById('loading');
const loadMoreBox = document.getElementById('loadMoreBox');
const loadMoreBtn = document.getElementById('loadMoreBtn');

function getRandomReview(){
    const rating = (Math.random() * 1 + 4).toFixed(1);
    const reviews = Math.floor(Math.random() * 200) + 50;
    return {rating, reviews};
}

function getStars(rating){
    const fullStars = Math.floor(rating);
    let stars = '';
    for(let i=0; i<5; i++){
        stars += `<i class="fa-solid fa-star ${i < fullStars? '' : 'fa-regular'}"></i>`;
    }
    return stars;
}

async function loadAllProducts(){
    const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
    allProducts = snap.docs.map(doc => ({id: doc.id,...doc.data()}));
    allProducts.sort(() => Math.random() - 0.5);
    
    displayedProducts = [...allProducts];
    loading.style.display = 'none';
    loadMoreBox.style.display = 'block';
    loadMore();
}

function createCard(product){
    const current = Number(product.currentPrice || 0);
    const old = Number(product.oldPrice || 0);
    const discountAmount = old > current? old - current : 0;
    const discountPercent = old > current? Math.round((discountAmount / old) * 100) : 0;
    
    const review = getRandomReview();
    
    return `
    <div class="card" onclick="window.location='product.html?id=${product.id}'">
        <img src="${product.images?.[0] || product.image}" alt="${product.name}" loading="lazy">
        <h3>${product.name}</h3>
        
        <div class="review-row">
            <div class="stars">${getStars(review.rating)}</div>
            <div class="review-count">${review.rating} (${review.reviews})</div>
        </div>

        <div class="current">৳${current.toFixed(2)}</div>
        ${old > current? `<div class="old">৳${old.toFixed(2)}</div>` : ''}
        ${discountPercent > 0? `<div class="discount-badge">${discountPercent}% OFF</div>` : ''}
        ${discountAmount > 0? `<div class="save-text">You Save: ৳${discountAmount.toFixed(2)}</div>` : ''}
        
        <button class="btn-cart" onclick="event.stopPropagation(); addToCart('${product.id}')">
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
        </button>
        <button class="btn-buy" onclick="event.stopPropagation(); buyNow('${product.id}')">
            <i class="fa-solid fa-bolt"></i> Buy Now
        </button>
    </div>`;
}

window.buyNow = (id) => {
    const product = allProducts.find(p => p.id == id);
    let cart = JSON.parse(localStorage.getItem("bdshop_cart")) || []; // CHANGED
    const item = cart.find(i => i.id == id);
    if(item){
        item.qty += 1;
    }else{
        cart.push({...product, qty:1, price: Number(product.currentPrice)});
    }
    localStorage.setItem("bdshop_cart", JSON.stringify(cart)); // CHANGED
    window.location.href = "checkout.html";
};

window.loadMore = () => {
    loadMoreBtn.disabled = true;
    loadMoreBtn.innerText = "Loading...";
    loadMoreBtn.classList.remove('active');
    
    setTimeout(() => {
        const nextProducts = displayedProducts.slice(currentIndex, currentIndex + PER_PAGE);
        grid.innerHTML += nextProducts.map(createCard).join('');
        currentIndex += PER_PAGE;
        
        if(currentIndex >= displayedProducts.length){
            loadMoreBtn.innerText = "All Products Loaded ✓";
            loadMoreBtn.disabled = true;
        } else {
            loadMoreBtn.innerText = "Load More +";
            loadMoreBtn.disabled = false;
            loadMoreBtn.classList.add('active');
        }
    }, 300);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    grid.innerHTML = '';
    currentIndex = 0;

    if(keyword == ''){
        displayedProducts = [...allProducts];
    } else {
        displayedProducts = allProducts.filter(p => {
            const name = (p.name || "").toLowerCase();
            const description = (p.description || "").toLowerCase();
            const keywords = (p.keywords || []).join(" ").toLowerCase();
            return name.includes(keyword) || description.includes(keyword) || keywords.includes(keyword);
        });
    }

    displayedProducts.sort(() => Math.random() - 0.5);
    loadMoreBtn.disabled = false;
    loadMore();
});

window.addToCart = (id) => {
    const product = allProducts.find(p => p.id == id);
    let cart = JSON.parse(localStorage.getItem("bdshop_cart")) || []; // CHANGED
    let item = cart.find(i => i.id == id);
    if(item){ item.qty += 1; } 
    else { cart.push({...product, qty: 1, price: Number(product.currentPrice)}); } // Added price
    localStorage.setItem("bdshop_cart", JSON.stringify(cart)); // CHANGED
    showPopup("Success!", `${product.name} added to cart`);
}

function showPopup(title, msg){
    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMsg').innerText = msg;
    document.getElementById('popup').style.display = 'flex';
}
window.closePopup = () => document.getElementById('popup').style.display = 'none';

loadAllProducts();
</script>
</body>
</html>

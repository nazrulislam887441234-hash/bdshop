<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products - HUTBAZ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#16a34a;--danger:#ef4444;--warning:#fbbf24;--gradient:linear-gradient(135deg,#2563eb,#1e40af);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(180deg,#eff6ff 0%,#dbeafe 100%);min-height:100vh;padding-bottom:50px;}
.container{max-width:1500px;margin:0 auto;padding:20px;}

/* Header Premium */
.header-box{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:30px;border-radius:25px;margin-bottom:25px;box-shadow:0 15px 50px rgba(37,99,235,.1);border:1px solid rgba(219,234,254,0.5);}
.header-title{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;}
.header-title i{font-size:35px;color:var(--primary);}
.header-title h1{font-size:28px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.search-box{position:relative;max-width:600px;margin:0 auto;}
.search-box input{width:100%;padding:18px 55px 18px 22px;border:2px solid rgba(37,99,235,.2);border-radius:18px;font-size:16px;background:#fff;font-weight:600;transition:.3s;}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(37,99,235,.15);}
.search-box i{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:20px;}

/* Product Grid */
.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
}
@media (min-width:640px){.grid{grid-template-columns:repeat(3, 1fr);}}
@media (min-width:768px){.grid{grid-template-columns:repeat(4, 1fr);}}
@media (min-width:1024px){.grid{grid-template-columns:repeat(5, 1fr);}}
@media (min-width:1280px){.grid{grid-template-columns:repeat(6, 1fr);gap:22px;}}

.card{
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(10px);
    border-radius:22px;
    padding:14px;
    box-shadow:0 8px 30px rgba(37,99,235,.08);
    transition:.4s;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    border:2px solid transparent;
    position:relative;
}
.card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(37,99,235,.2);border-color:var(--primary);}
.card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:18px;
    margin-bottom:10px;
    transition:.4s;
}
.card:hover img{transform:scale(1.05);}
.card h3{font-size:15px;font-weight:700;color:#1e293b;height:40px;overflow:hidden;line-height:1.4;margin-bottom:6px;}

/* Review Stars */
.review-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.stars{color:var(--warning);font-size:12px;}
.review-count{font-size:11px;color:#64748b;font-weight:600;}

.current{font-size:19px;font-weight:900;color:var(--accent);margin-bottom:3px;}
.old{font-size:13px;color:#94a3b8;text-decoration:line-through;margin-bottom:4px;font-weight:600;}
.discount-badge{font-size:11px;background:linear-gradient(135deg,var(--danger),#dc2626);color:#fff;padding:4px 8px;border-radius:8px;font-weight:800;display:inline-block;margin-bottom:5px;width:fit-content;}
.save-text{font-size:11px;color:var(--danger);font-weight:700;margin-bottom:8px;}
.btn-cart{width:100%;padding:11px;margin-top:auto;background:var(--gradient);border:none;border-radius:14px;color:#fff;font-weight:800;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:.3s;}
.btn-cart:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(37,99,235,.3);}

/* Load More */
.load-more{text-align:center;margin:35px 0;}
.load-more button{padding:16px 45px;background:#cbd5e1;border:none;border-radius:16px;color:#fff;font-weight:800;font-size:16px;cursor:pointer;transition:.3s;}
.load-more button.active{background:var(--gradient);box-shadow:0 8px 25px rgba(37,99,235,.3);}
.load-more button:hover:not(:disabled){transform:translateY(-2px);}
.load-more button:disabled{cursor:not-allowed;}
.loading{text-align:center;padding:40px;color:var(--primary);font-weight:800;font-size:18px;}
.loading i{font-size:35px;margin-bottom:15px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* Popup Premium */
.popup{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:999;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.popup-box{background:#fff;padding:35px;border-radius:25px;text-align:center;max-width:380px;width:90%;transform:scale(.9);animation:scaleUp .3s forwards;box-shadow:0 25px 80px rgba(0,0,0,.3);}
@keyframes scaleUp{to{transform:scale(1);}}
.popup-icon{font-size:60px;margin-bottom:15px;color:var(--accent);}
.popup-box h3{margin-bottom:10px;font-size:22px;font-weight:900;}
.popup-box p{color:#64748b;margin-bottom:20px;font-weight:600;}
.popup-btn{padding:14px 30px;background:var(--gradient);border:none;border-radius:14px;color:#fff;font-weight:800;cursor:pointer;font-size:16px;}
.btn-buy{
    width:100%;
    padding:11px;
    margin-top:8px;
    background:#16a34a;
    border:none;
    border-radius:14px;
    color:#fff;
    font-weight:800;
    cursor:pointer;
    font-size:13px;
}
</style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div class="header-title">
            <i class="fa-solid fa-bag-shopping"></i>
            <h1>All Products</h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products by name, description...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>

    <div class="grid" id="productGrid"></div>
    
    <div class="loading" id="loading"><i class="fa-solid fa-spinner"></i><br>Loading Products...</div>
    
    <div class="load-more" id="loadMoreBox" style="display:none;">
        <button id="loadMoreBtn" onclick="loadMore()">Load More +</button>
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h3 id="popupTitle">Success!</h3>
        <p id="popupMsg">Added to cart</p>
        <button class="popup-btn" onclick="closePopup()">Continue Shopping</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];
let displayedProducts = [];
let currentIndex = 0;
const PER_PAGE = 20;

const grid = document.getElementById('productGrid');
const loading = document.getElementById('loading');
const loadMoreBox = document.getElementById('loadMoreBox');
const loadMoreBtn = document.getElementById('loadMoreBtn');

// Generate Random Rating like homepage
function getRandomReview(){
    const rating = (Math.random() * 1 + 4).toFixed(1); // 4.0 to 5.0
    const reviews = Math.floor(Math.random() * 200) + 50; // 50 to 250
    return {rating, reviews};
}

// Generate Stars HTML
function getStars(rating){
    const fullStars = Math.floor(rating);
    let stars = '';
    for(let i=0; i<5; i++){
        stars += `<i class="fa-solid fa-star ${i < fullStars ? '' : 'fa-regular'}"></i>`;
    }
    return stars;
}

// Load All Products
async function loadAllProducts(){
    const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
    allProducts = snap.docs.map(doc => ({id: doc.id,...doc.data()}));
    allProducts.sort(() => Math.random() - 0.5); // Random
    
    displayedProducts = [...allProducts];
    loading.style.display = 'none';
    loadMoreBox.style.display = 'block';
    loadMore();
}

// Create Card with Review + Discount
function createCard(product){
    const current = Number(product.currentPrice || 0);
    const old = Number(product.oldPrice || 0);
    const discountAmount = old > current? old - current : 0;
    const discountPercent = old > current? Math.round((discountAmount / old) * 100) : 0;
    
    const review = getRandomReview(); // Random review like homepage
    
    return `
    <div class="card" onclick="window.location='product.html?id=${product.id}'">
        <img src="${product.images?.[0] || product.image}" alt="${product.name}" loading="lazy">
        <h3>${product.name}</h3>
        
        <div class="review-row">
            <div class="stars">${getStars(review.rating)}</div>
            <div class="review-count">${review.rating} (${review.reviews})</div>
        </div>

        <div class="current">৳${current.toFixed(2)}</div>
        ${old > current? `<div class="old">৳${old.toFixed(2)}</div>` : ''}
        ${discountPercent > 0? `<div class="discount-badge">${discountPercent}% OFF</div>` : ''}
        ${discountAmount > 0? `<div class="save-text">You Save: ৳${discountAmount.toFixed(2)}</div>` : ''}
        
        <button class="btn-cart" onclick="event.stopPropagation(); addToCart('${product.id}')">
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
        </button>
<button class="btn-buy" onclick="event.stopPropagation(); buyNow('${product.id}')">
    <i class="fa-solid fa-bolt"></i> Buy Now
</button>
    </div>`;
}

window.buyNow = (id) => {
    const product = allProducts.find(p => p.id == id);

    let cart = JSON.parse(localStorage.getItem("hutbaz_cart")) || [];

    const item = cart.find(i => i.id == id);

    if(item){
        item.qty += 1;
    }else{
        cart.push({...product, qty:1});
    }

    localStorage.setItem("hutbaz_cart", JSON.stringify(cart));

    window.location.href = "checkout.html";
};
// Load 20 at a time
window.loadMore = () => {
    loadMoreBtn.disabled = true;
    loadMoreBtn.innerText = "Loading...";
    loadMoreBtn.classList.remove('active');
    
    setTimeout(() => {
        const nextProducts = displayedProducts.slice(currentIndex, currentIndex + PER_PAGE);
        grid.innerHTML += nextProducts.map(createCard).join('');
        currentIndex += PER_PAGE;
        
        if(currentIndex >= displayedProducts.length){
            loadMoreBtn.innerText = "All Products Loaded";
            loadMoreBtn.disabled = true;
        } else {
            loadMoreBtn.innerText = "Load More +";
            loadMoreBtn.disabled = false;
            loadMoreBtn.classList.add('active');
        }
    }, 300);
}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    grid.innerHTML = '';
    currentIndex = 0;

    if(keyword == ''){
        displayedProducts = [...allProducts];
    } else {
        displayedProducts = allProducts.filter(p => {
            const name = (p.name || "").toLowerCase();
            const description = (p.description || "").toLowerCase();
            const keywords = (p.keywords || []).join(" ").toLowerCase();
            return name.includes(keyword) || description.includes(keyword) || keywords.includes(keyword);
        });
    }

    displayedProducts.sort(() => Math.random() - 0.5);
    loadMoreBtn.disabled = false;
    loadMore();
});

// Add to Cart with Popup
window.addToCart = (id) => {
    const product = allProducts.find(p => p.id == id);
    let cart = JSON.parse(localStorage.getItem("hutbaz_cart")) || [];
    let item = cart.find(i => i.id == id);
    if(item){ item.qty += 1; } 
    else { cart.push({...product, qty: 1}); }
    localStorage.setItem("hutbaz_cart", JSON.stringify(cart));
    showPopup("Success!", `${product.name} added to cart`);
}

function showPopup(title, msg){
    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMsg').innerText = msg;
    document.getElementById('popup').style.display = 'flex';
}
window.closePopup = () => document.getElementById('popup').style.display = 'none';

loadAllProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#16a34a;--gradient:linear-gradient(135deg,#2563eb,#1e40af);--glow:0 0 25px rgba(37,99,235,.2);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}
body{background:linear-gradient(180deg,#eff6ff 0%,#dbeafe 100%);color:#1e293b;}
a{text-decoration:none;color:inherit;}
.container{max-width:1400px;margin:0 auto;padding:20px;}

/* Header */
.header{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);padding:18px 25px;border-radius:20px;margin-bottom:25px;display:flex;align-items:center;gap:15px;box-shadow:var(--glow);border:1px solid rgba(37,99,235,.1);}
.back-btn{font-size:22px;color:var(--primary);font-weight:700;display:flex;align-items:center;gap:8px;}
.back-btn:hover{transform:translateX(-3px);}
.cat-title{font-size:26px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Search */
.search-box{width:100%;max-width:650px;margin:0 auto 35px;position:relative;}
.search-box input{width:100%;padding:18px 55px 18px 22px;border:2px solid rgba(37,99,235,.2);border-radius:18px;font-size:16px;background:rgba(255,255,255,.95);box-shadow:0 6px 25px rgba(37,99,235,.08);transition:.3s;font-weight:600;}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(37,99,235,.15);}
.search-box i{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:20px;}

/* Products - Responsive Grid */
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(min-width:640px){.products{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.products{grid-template-columns:repeat(4,1fr);}}
@media(min-width:992px){.products{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1200px){.products{grid-template-columns:repeat(6,1fr);gap:22px;}}

.product-card{background:rgba(255,255,255,.95);backdrop-filter:blur(15px);border-radius:22px;padding:14px;box-shadow:0 10px 35px rgba(37,99,235,.1);transition:.4s;border:2px solid transparent;display:flex;flex-direction:column;}
.product-card:hover{transform:translateY(-10px);box-shadow:var(--glow);border-color:var(--primary);}
.product-card img{width:100%;aspect-ratio:1/1;border-radius:18px;object-fit:cover;margin-bottom:10px;transition:.4s;}
.product-card:hover img{transform:scale(1.05);}
.product-card h4{font-size:14px;margin-bottom:8px;height:40px;overflow:hidden;font-weight:700;line-height:1.4;color:#1e293b;flex:1;}
.price-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.current{font-size:18px;font-weight:900;color:var(--accent);}
.old{font-size:13px;color:#94a3b8;text-decoration:line-through;font-weight:600;}
.add-cart-btn{width:100%;padding:10px;background:var(--gradient);color:#fff;border:none;border-radius:12px;font-weight:800;cursor:pointer;transition:.3s;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-cart-btn:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(37,99,235,.3);}

.loading{text-align:center;padding:60px;color:var(--primary);font-weight:800;font-size:18px;}
.loading i{font-size:35px;margin-bottom:15px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
.no-data{text-align:center;padding:60px;color:#94a3b8;font-weight:700;font-size:16px;}

/* See More Button */
.load-more{text-align:center;margin-top:35px;}
.load-more button{background:var(--gradient);color:#fff;border:none;padding:16px 40px;border-radius:16px;font-size:16px;font-weight:800;cursor:pointer;transition:.3s;box-shadow:0 8px 25px rgba(37,99,235,.3);}
.load-more button:hover{transform:scale(1.05) translateY(-2px);}
.load-more button:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none;}
.review-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:8px;
}

.stars{
    color:#fbbf24;
    font-size:12px;
}

.review-count{
    font-size:11px;
    color:#64748b;
}

.discount-badge{
    display:inline-block;
    background:#ef4444;
    color:#fff;
    padding:4px 8px;
    border-radius:8px;
    font-size:11px;
    font-weight:700;
    margin-bottom:5px;
}

.save-text{
    color:#16a34a;
    font-size:12px;
    font-weight:700;
    margin-bottom:8px;
}

.buy-btn{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#16a34a;
    color:#fff;
    font-weight:800;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <div class="cat-title" id="catTitle">Loading...</div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" id="productSearch" placeholder="Search products by name or keyword...">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>

    <!-- Products -->
    <div class="products" id="productGrid"></div>
    <div class="loading" id="loading"><i class="fa-solid fa-spinner"></i><br>Loading Products...</div>

    <!-- Load More -->
    <div class="load-more" id="loadMoreBtn" style="display:none;">
        <button onclick="loadMoreProducts()">Load More <i class="fa-solid fa-arrow-down"></i></button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];
let filteredProducts = [];
let displayedCount = 0;
const perPage = 20;

const grid = document.getElementById('productGrid');
const loading = document.getElementById('loading');
const loadMoreBtn = document.getElementById('loadMoreBtn');

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function loadCategoryProducts(){
    if(!slug){
        loading.innerHTML = '<div class="no-data">❌ Category Not Found</div>';
        return;
    }

    // 1. Get Category Name
    const catSnap = await getDocs(query(collection(db, "categories"), where("slug", "==", slug)));
    let catName = slug;
    let catId = '';
    if(!catSnap.empty){
        const catData = catSnap.docs[0].data();
        catName = catData.name;
        catId = catSnap.docs[0].id;
    } else {
        catId = slug;
    }
    document.getElementById('catTitle').innerText = catName;
    document.title = catName + ' - HUTBAZ';

    // 2. Get All Products
    const prodSnap = await getDocs(query(collection(db, "products"), where("categoryId", "==", catId)));
    allProducts = prodSnap.docs.map(doc => ({id: doc.id,...doc.data()}));

    // 3. Shuffle
    allProducts = shuffleArray(allProducts);
    filteredProducts = [...allProducts];

    loading.style.display = 'none';
    loadMoreProducts();
}

window.loadMoreProducts = () => {
    const nextProducts = filteredProducts.slice(displayedCount, displayedCount + perPage);
    renderProducts(nextProducts, true);
    displayedCount += perPage;

    if(displayedCount >= filteredProducts.length){
        loadMoreBtn.style.display = 'none';
    } else {
        loadMoreBtn.style.display = 'block';
    }
}

function renderProducts(products, append = false){
    if(!append) grid.innerHTML = '';

    if(products.length == 0 &&!append){
        grid.innerHTML = '<div class="no-data"><i class="fa-solid fa-box-open"></i><br>No Products in this Category</div>';
        return;
    }

    const html = products.map(p => {
        const current = Number(p.currentPrice || 0);
        const old = Number(p.oldPrice || 0);
const discountAmount = old > current ? old - current : 0;
const discountPercent = old > current
    ? Math.round((discountAmount / old) * 100)
    : 0;

const rating = (Math.random() * 0.5 + 4.5).toFixed(1);
const reviews = Math.floor(Math.random() * 400 + 100);
        return `
<div class="product-card">
    <a href="product.html?id=${p.id}">
        <img src="${p.images?.[0] || p.image}" loading="lazy" alt="${p.name}">
        <h4>${p.name}</h4>
    </a>

    <div class="review-row">
        <div class="stars">
            ★★★★★
        </div>
        <div class="review-count">${rating} (${reviews}) Reviews</div>
    </div>

    <div class="price-wrap">
        <div class="current">৳${current.toFixed(2)}</div>
        ${old > current ? `<div class="old">৳${old.toFixed(2)}</div>` : ""}
    </div>

    ${discountPercent > 0 ? `
        <div class="discount-badge">${discountPercent}% OFF</div>
        <div class="save-text">
            Save ৳${discountAmount.toFixed(2)}
        </div>
    ` : ""}

<button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">
    <i class="fa-solid fa-cart-plus"></i>
    Add to Cart
</button>

<button class="buy-btn" onclick="event.stopPropagation(); buyNow('${p.id}')">
    <i class="fa-solid fa-bolt"></i>
    Buy Now
</button>
</div>
`;
    }).join('');

    grid.innerHTML += html;
}

// Add to Cart Function
window.addToCart = (productId) => {
    const product = allProducts.find(p => p.id === productId);
    if(!product) return;

    let cart = JSON.parse(localStorage.getItem('hutbaz_cart')) || [];
    const existing = cart.find(item => item.id === productId);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({...product, qty: 1});
    }

    localStorage.setItem('hutbaz_cart', JSON.stringify(cart));
    alert(`✅ ${product.name} added to cart`);
    updateHeaderCart();
}

window.buyNow = (productId) => {
    addToCart(productId);
    window.location.href = "checkout.html";
};
function updateHeaderCart(){
    const cart = JSON.parse(localStorage.getItem('hutbaz_cart')) || [];
    const total = cart.reduce((sum, item) => sum + item.qty, 0);
    const cartCount = document.getElementById('cartCount');
    if(cartCount) cartCount.innerText = total;
}

// Product Search
document.getElementById('productSearch').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    filteredProducts = allProducts.filter(p =>
        p.name.toLowerCase().includes(keyword) ||
        (p.keywords && p.keywords.toLowerCase().includes(keyword))
    );
    displayedCount = 0;
    grid.innerHTML = '';
    loadMoreProducts();
});

loadCategoryProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary:#FF6B35;
    --primary-dark:#E85A1A;
    --accent:#FFA500;
    --success:#16a34a;
    --danger:#ef4444;
    --warning:#FFA500;
    --gradient:linear-gradient(135deg,#FF6B35 0%,#FFA500 100%);
    --glow:0 0 30px rgba(255,107,53,.2);
    --bg:#FFF8F3;
    --card:rgba(255,255,255,0.95);
    --text:#1A1A1A;
    --muted:#64748B;
    --border:#FFE4D6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Bengali',sans-serif;}
body{background:linear-gradient(180deg,#FFF8F3 0%,#FFE4D6 100%);color:var(--text);}
a{text-decoration:none;color:inherit;}
.container{max-width:1600px;margin:0 auto;padding:20px;}

/* Header Glass Premium */
.header{
    background:rgba(255,255,255,.9);backdrop-filter:blur(30px);padding:22px 30px;border-radius:25px;
    margin-bottom:30px;display:flex;align-items:center;gap:18px;box-shadow:var(--glow);
    border:2px solid rgba(255,255,255,0.5);
}
.back-btn{
    font-size:22px;color:var(--primary);font-weight:900;display:flex;align-items:center;gap:10px;
    padding:10px 18px;border-radius:15px;background:rgba(255,107,53,0.1);transition:.3s;
}
.back-btn:hover{transform:translateX(-5px);background:var(--primary);color:#fff;}
.cat-title{
    font-size:30px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* Search Premium */
.search-box{width:100%;max-width:700px;margin:0 auto 40px;position:relative;}
.search-box input{
    width:100%;padding:20px 60px 20px 25px;border:3px solid var(--border);border-radius:20px;font-size:16px;
    background:rgba(255,255,255,.95);box-shadow:0 10px 35px rgba(255,107,53,.1);transition:.3s;font-weight:700;
}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(255,107,53,.2);}
.search-box i{position:absolute;right:25px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:22px;}

/* Products - 6 Column Grid */
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
@media(min-width:640px){.products{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.products{grid-template-columns:repeat(4,1fr);}}
@media(min-width:992px){.products{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1200px){.products{grid-template-columns:repeat(6,1fr);gap:25px;}}

.product-card{
    background:var(--card);backdrop-filter:blur(15px);border-radius:25px;padding:16px;
    box-shadow:0 12px 40px rgba(255,107,53,.12);transition:.4s cubic-bezier(.22,1,.36,1);
    border:2px solid transparent;display:flex;flex-direction:column;
}
.product-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:var(--glow);border-color:var(--primary);}
.product-card img{
    width:100%;aspect-ratio:1/1;border-radius:20px;object-fit:cover;margin-bottom:12px;
    transition:.4s;border:3px solid var(--border);
}
.product-card:hover img{transform:scale(1.08);}
.product-card h4{
    font-size:15px;margin-bottom:10px;height:42px;overflow:hidden;font-weight:900;line-height:1.4;
    color:var(--text);flex:1;
}
.price-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.current{font-size:19px;font-weight:900;color:var(--primary);}
.old{font-size:14px;color:var(--muted);text-decoration:line-through;font-weight:700;}
.add-cart-btn{
    width:100%;padding:11px;background:var(--gradient);color:#fff;border:none;border-radius:14px;
    font-weight:900;cursor:pointer;transition:.3s;font-size:14px;display:flex;align-items:center;
    justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(255,107,53,.3);
}
.add-cart-btn:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(255,107,53,.4);}

.loading{text-align:center;padding:80px;color:var(--primary);font-weight:900;font-size:20px;}
.loading i{font-size:45px;margin-bottom:20px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
.no-data{text-align:center;padding:80px;color:var(--muted);font-weight:800;font-size:18px;}

/* Load More */
.load-more{text-align:center;margin-top:40px;}
.load-more button{
    background:var(--gradient);color:#fff;border:none;padding:18px 45px;border-radius:18px;font-size:17px;
    font-weight:900;cursor:pointer;transition:.3s;box-shadow:0 10px 30px rgba(255,107,53,.4);
}
.load-more button:hover{transform:scale(1.05) translateY(-3px);}
.load-more button:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none;}

.review-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.stars{color:var(--warning);font-size:13px;}
.review-count{font-size:12px;color:var(--muted);font-weight:700;}

.discount-badge{
    display:inline-block;background:linear-gradient(135deg,var(--danger),#dc2626);color:#fff;
    padding:5px 10px;border-radius:10px;font-size:12px;font-weight:900;margin-bottom:6px;
    box-shadow:0 4px 12px rgba(239,68,68,0.3);
}
.save-text{color:var(--success);font-size:13px;font-weight:900;margin-bottom:10px;}

.buy-btn{
    width:100%;margin-top:8px;padding:11px;border:none;border-radius:14px;background:var(--success);
    color:#fff;font-weight:900;cursor:pointer;font-size:14px;transition:.3s;
    box-shadow:0 6px 20px rgba(22,163,74,0.3);
}
.buy-btn:hover{transform:scale(1.05);background:#15803D;}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <div class="cat-title" id="catTitle">Loading...</div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" id="productSearch" placeholder="Search products by name or keyword...">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>

    <!-- Products -->
    <div class="products" id="productGrid"></div>
    <div class="loading" id="loading"><i class="fa-solid fa-spinner"></i><br>Loading Products...</div>

    <!-- Load More -->
    <div class="load-more" id="loadMoreBtn" style="display:none;">
        <button onclick="loadMoreProducts()">Load More <i class="fa-solid fa-arrow-down"></i></button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];
let filteredProducts = [];
let displayedCount = 0;
const perPage = 24; // 6 columns * 4 rows

const grid = document.getElementById('productGrid');
const loading = document.getElementById('loading');
const loadMoreBtn = document.getElementById('loadMoreBtn');

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function loadCategoryProducts(){
    if(!slug){
        loading.innerHTML = '<div class="no-data">❌ Category Not Found</div>';
        return;
    }

    const catSnap = await getDocs(query(collection(db, "categories"), where("slug", "==", slug)));
    let catName = slug;
    let catId = '';
    if(!catSnap.empty){
        const catData = catSnap.docs[0].data();
        catName = catData.name;
        catId = catSnap.docs[0].id;
    } else {
        catId = slug;
    }
    document.getElementById('catTitle').innerText = catName;
    document.title = catName + ' - BD SHOP'; // CHANGED

    const prodSnap = await getDocs(query(collection(db, "products"), where("categoryId", "==", catId)));
    allProducts = prodSnap.docs.map(doc => ({id: doc.id,...doc.data()}));

    allProducts = shuffleArray(allProducts);
    filteredProducts = [...allProducts];

    loading.style.display = 'none';
    loadMoreProducts();
}

window.loadMoreProducts = () => {
    const nextProducts = filteredProducts.slice(displayedCount, displayedCount + perPage);
    renderProducts(nextProducts, true);
    displayedCount += perPage;

    if(displayedCount >= filteredProducts.length){
        loadMoreBtn.style.display = 'none';
    } else {
        loadMoreBtn.style.display = 'block';
    }
}

function renderProducts(products, append = false){
    if(!append) grid.innerHTML = '';

    if(products.length == 0 &&!append){
        grid.innerHTML = '<div class="no-data"><i class="fa-solid fa-box-open"></i><br>No Products in this Category</div>';
        return;
    }

    const html = products.map(p => {
        const current = Number(p.currentPrice || 0);
        const old = Number(p.oldPrice || 0);
        const discountAmount = old > current? old - current : 0;
        const discountPercent = old > current? Math.round((discountAmount / old) * 100) : 0;

        const rating = (Math.random() * 0.5 + 4.5).toFixed(1);
        const reviews = Math.floor(Math.random() * 400 + 100);

        return `
        <div class="product-card">
            <a href="product.html?id=${p.id}">
                <img src="${p.images?.[0] || p.image}" loading="lazy" alt="${p.name}">
                <h4>${p.name}</h4>
            </a>

            <div class="review-row">
                <div class="stars">★★★★★</div>
                <div class="review-count">${rating} (${reviews})</div>
            </div>

            <div class="price-wrap">
                <div class="current">৳${current.toFixed(2)}</div>
                ${old > current? `<div class="old">৳${old.toFixed(2)}</div>` : ""}
            </div>

            ${discountPercent > 0? `
                <div class="discount-badge">${discountPercent}% OFF</div>
                <div class="save-text">Save ৳${discountAmount.toFixed(2)}</div>
            ` : ""}

            <button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">
                <i class="fa-solid fa-cart-plus"></i> Add to Cart
            </button>

            <button class="buy-btn" onclick="event.stopPropagation(); buyNow('${p.id}')">
                <i class="fa-solid fa-bolt"></i> Buy Now
            </button>
        </div>
        `;
    }).join('');

    grid.innerHTML += html;
}

window.addToCart = (productId) => {
    const product = allProducts.find(p => p.id === productId);
    if(!product) return;

    let cart = JSON.parse(localStorage.getItem('bdshop_cart')) || []; // CHANGED
    const existing = cart.find(item => item.id === productId);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({...product, qty: 1, price: Number(product.currentPrice)}); // Added price
    }

    localStorage.setItem('bdshop_cart', JSON.stringify(cart)); // CHANGED
    alert(`✅ ${product.name} added to cart`);
    updateHeaderCart();
}

window.buyNow = (productId) => {
    addToCart(productId);
    window.location.href = "checkout.html";
};

function updateHeaderCart(){
    const cart = JSON.parse(localStorage.getItem('bdshop_cart')) || []; // CHANGED
    const total = cart.reduce((sum, item) => sum + item.qty, 0);
    const cartCount = document.getElementById('cartCount');
    if(cartCount) cartCount.innerText = total;
}

document.getElementById('productSearch').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    filteredProducts = allProducts.filter(p =>
        p.name.toLowerCase().includes(keyword) ||
        (p.keywords && p.keywords.toLowerCase().includes(keyword))
    );
    displayedCount = 0;
    grid.innerHTML = '';
    loadMoreProducts();
});

loadCategoryProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - BD SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary:#FF6B35;
    --primary-dark:#E85A1A;
    --accent:#FFA500;
    --success:#16a34a;
    --danger:#ef4444;
    --gradient:linear-gradient(135deg,#FF6B35 0%,#FFA500 100%);
    --bg:#FFF8F3;
    --card:rgba(255,255,255,0.9);
    --glass:rgba(255,255,255,0.7);
    --text:#1A1A1A;
    --muted:#64748B;
    --border:#FFE4D6;
    --shadow:0 20px 60px rgba(255,107,53,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Bengali',sans-serif;}
body{background:linear-gradient(135deg,#FFF8F3 0%,#FFE4D6 100%);padding:20px;min-height:100vh;}
.container{max-width:1150px;margin:0 auto;display:grid;grid-template-columns:1fr 1.2fr;gap:25px;}
@media(max-width:900px){.container{grid-template-columns:1fr;}}

/* Glass Card Premium */
.card{
    background:var(--card);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);
    border-radius:30px;padding:35px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.5);
    transition:.3s;
}
.card:hover{transform:translateY(-5px);box-shadow:0 30px 80px rgba(255,107,53,0.2);}
h2{
    margin-bottom:25px;font-size:24px;font-weight:900;display:flex;align-items:center;gap:12px;
    background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* Cart Items Premium */
.cart-item{
    display:flex;gap:18px;margin-bottom:18px;padding-bottom:18px;border-bottom:2px solid rgba(255,228,214,0.6);
    transition:.3s;padding:12px;border-radius:15px;
}
.cart-item:hover{background:rgba(255,248,243,0.6);}
.cart-item img{
    width:75px;height:75px;border-radius:15px;object-fit:cover;border:3px solid var(--border);
    box-shadow:0 5px 15px rgba(255,107,53,0.15);
}
.cart-info{flex:1;}
.cart-info h4{font-size:16px;margin-bottom:6px;font-weight:800;color:var(--text);}
.cart-info p{color:var(--primary);font-weight:900;font-size:16px;}
.qty-btn{
    display:flex;align-items:center;gap:12px;margin-top:10px;
}
.qty-btn button{
    width:32px;height:32px;border:none;background:var(--gradient);color:white;border-radius:10px;
    font-weight:900;cursor:pointer;transition:.3s;font-size:16px;box-shadow:0 4px 12px rgba(255,107,53,0.3);
}
.qty-btn button:hover{transform:scale(1.15);}
.qty-btn span{font-weight:900;font-size:16px;min-width:30px;text-align:center;}

.summary-row{display:flex;justify-content:space-between;font-size:16px;margin:12px 0;color:var(--muted);font-weight:700;}
.total-row{
    display:flex;justify-content:space-between;font-size:22px;font-weight:900;margin-top:18px;
    padding-top:18px;border-top:3px dashed var(--border);color:var(--primary);
}

/* Form Premium */
input,textarea,select{
    width:100%;padding:16px;margin-top:10px;border-radius:15px;border:2px solid var(--border);
    font-size:15px;font-weight:700;background:rgba(255,255,255,0.8);transition:.3s;
}
input:focus,textarea:focus,select:focus{
    border-color:var(--primary);outline:none;box-shadow:0 0 0 4px rgba(255,107,53,0.15);background:#fff;
}
label{font-weight:800;margin-top:15px;display:block;font-size:14px;color:var(--text);}

/* Buttons Premium */
.btn{
    width:100%;padding:20px;margin-top:25px;background:var(--gradient);border:none;border-radius:18px;
    color:#fff;font-weight:900;font-size:18px;cursor:pointer;box-shadow:0 10px 35px rgba(255,107,53,.4);
    transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 15px 50px rgba(255,107,53,.5);}
.btn:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none;transform:none;}
.btn-cancel{
    background:rgba(100,116,139,0.1);color:var(--muted);margin-top:12px;box-shadow:none;
    border:2px solid var(--border);
}
.btn-cancel:hover{background:rgba(100,116,139,0.2);transform:none;}

/* Popup Premium */
.popup{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
    display:none;align-items:center;justify-content:center;z-index:999;animation:fadeIn.3s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup-box{
    background:var(--card);padding:40px;border-radius:30px;text-align:center;max-width:450px;width:90%;
    box-shadow:0 30px 80px rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.5);
    animation:scaleUp.4s cubic-bezier(.22,1,.36,1);
}
@keyframes scaleUp{from{transform:scale(0.8)}to{transform:scale(1)}}
.popup-box h3{margin-bottom:12px;font-size:26px;font-weight:900;color:var(--text);}
.order-id{
    background:linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,165,0,0.1));
    padding:15px;border-radius:15px;font-weight:900;font-size:20px;margin:20px 0;
    display:flex;justify-content:space-between;align-items:center;border:2px dashed var(--primary);
}
.copy-btn{
    background:var(--gradient);color:#fff;border:none;padding:10px 16px;border-radius:10px;
    cursor:pointer;font-weight:900;transition:.3s;box-shadow:0 4px 15px rgba(255,107,53,0.3);
}
.copy-btn:hover{transform:scale(1.1);}
.popup-btn{
    padding:15px 30px;border:none;border-radius:15px;font-weight:900;cursor:pointer;font-size:17px;
    background:var(--gradient);color:#fff;box-shadow:0 8px 25px rgba(255,107,53,.4);transition:.3s;
}
.popup-btn:hover{transform:translateY(-2px);}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2><i class="fa-solid fa-cart-shopping"></i> Your Order</h2>
        <div id="cartSummary"></div>
        <div class="summary-row"><span>Subtotal:</span><span id="subTotal">৳0.00</span></div>
        <div class="summary-row"><span>Delivery Charge:</span><span id="deliveryCharge">৳0.00</span></div>
        <div class="total-row"><span>Grand Total:</span><span id="totalAmount">৳0.00</span></div>
    </div>

    <div class="card">
        <h2><i class="fa-solid fa-truck-fast"></i> Delivery Information</h2>
        <form id="orderForm">
            <label>Full Name *</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
            <label>Delivery Area *</label>
            <div id="location-selector"></div>
            <label>Order Note (Optional)</label>
            <textarea id="note" rows="2" placeholder="Any special instructions?"></textarea>
            <button type="submit" class="btn" id="submitBtn"><i class="fa-solid fa-check"></i> Confirm Order</button>
            <button type="button" class="btn btn-cancel" onclick="goToCart()"><i class="fa-solid fa-arrow-left"></i> Cancel</button>
        </form>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <div id="popupIcon" style="font-size:60px;margin-bottom:15px;"></div>
        <h3 id="popupTitle"></h3>
        <p id="popupMsg" style="color:var(--muted);font-weight:700;"></p>
        <div id="orderIdBox" style="display:none;">
            <div class="order-id"><span id="orderIdText"></span><button class="copy-btn" onclick="copyOrderId()"><i class="fa-solid fa-copy"></i></button></div>
        </div>
        <button class="popup-btn" onclick="closePopup()">Continue Shopping</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = JSON.parse(localStorage.getItem('bdshop_cart')) || []; // CHANGED
let subTotal = 0;
let deliveryCharge = 0;

window.changeQty = (id, change) => {
    let index = cart.findIndex(item => item.id == id);
    if(index === -1) return;
    cart[index].qty += change;
    if(cart[index].qty <= 0){ cart.splice(index,1); }
    localStorage.setItem("bdshop_cart", JSON.stringify(cart)); // CHANGED
    loadCart();
};

function loadCart(){
    window.addEventListener("locationChanged", () => { updateDeliveryCharge(); });
    setTimeout(() => { updateDeliveryCharge(); }, 300);

    const summary = document.getElementById('cartSummary');
    if(cart.length == 0){ window.location.href = 'cart.html'; return; }
    subTotal = 0;
    summary.innerHTML = '';
    cart.forEach(item => {
        subTotal += Number(item.price || item.currentPrice) * item.qty;
        summary.innerHTML += `
        <div class="cart-item">
            <img src="${item.images?.[0] || item.image}">
            <div class="cart-info">
                <h4>${item.name}</h4>
                <p>৳${item.price || item.currentPrice}</p>
                <div class="qty-btn">
                    <button onclick="changeQty('${item.id}', -1)">−</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty('${item.id}', 1)">+</button>
                </div>
            </div>
        </div>`;
    });
    document.getElementById('subTotal').innerText = '৳' + subTotal.toFixed(2);
    updateDeliveryCharge();
}

window.updateDeliveryCharge = () => {
    if (!window.bdLocation) return;
    const loc = window.bdLocation.getSelectedLocation();
    if (!loc.division) {
        deliveryCharge = 0;
    } else if (loc.division === "Dhaka") {
        deliveryCharge = 60;
    } else {
        deliveryCharge = 120;
    }
    document.getElementById("deliveryCharge").innerText = "৳" + deliveryCharge;
    document.getElementById("totalAmount").innerText = "৳" + (subTotal + deliveryCharge).toFixed(2);
};

document.getElementById('orderForm').onsubmit = async (e) => {
    e.preventDefault();
    const loc = window.bdLocation.getSelectedLocation();
    if(!loc.division ||!loc.district ||!loc.upazila){ alert("Please select your full location!"); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

    try {
        const orderId = 'BD' + Date.now().toString().slice(-8); // CHANGED to BD
        await addDoc(collection(db, "orders"), {
            orderId,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            division: loc.division,
            district: loc.district,
            thana: loc.upazila,
            note: document.getElementById('note').value,
            items: cart,
            total: subTotal + deliveryCharge,
            status: "New",
            createdAt: serverTimestamp()
        });
        localStorage.removeItem('bdshop_cart'); // CHANGED
        document.getElementById('orderIdText').innerText = orderId;
        document.getElementById('orderIdBox').style.display = 'block';
        showPopup('✅', 'Order Successful!', 'Your order has been placed successfully.');
    } catch(err){
        showPopup('❌', 'Order Failed', err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Confirm Order';
    }
}

function showPopup(icon, title, msg){
    document.getElementById('popupIcon').innerText = icon;
    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMsg').innerText = msg;
    document.getElementById('popup').style.display = 'flex';
}

window.closePopup = () => {
    document.getElementById('popup').style.display = 'none';
    window.location.href = 'index.html';
}
window.copyOrderId = () => {
    navigator.clipboard.writeText(document.getElementById('orderIdText').innerText);
    alert("Order ID Copied!");
}
window.goToCart = () => window.location.href = 'cart.html';

loadCart();
</script>
<script src="location.js"></script>
</body>
</html>

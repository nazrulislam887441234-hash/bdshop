<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Categories - HUTBAZ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#fbbf24;--gradient:linear-gradient(135deg,#2563eb,#1e40af);--glow:0 0 30px rgba(37,99,235,.2);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}
body{background:linear-gradient(180deg,#eff6ff 0%,#dbeafe 100%);color:#1e293b;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* Header - Glass Premium */
.header{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);z-index:1000;padding:18px 25px;display:flex;align-items:center;gap:15px;box-shadow:0 4px 20px rgba(37,99,235,.08);border-bottom:2px solid rgba(37,99,235,.1);}
.back-btn{font-size:24px;color:var(--primary);transition:.3s;flex-shrink:0;display:flex;align-items:center;gap:8px;font-weight:700;}
.back-btn:hover{transform:scale(1.1) translateX(-3px);}
.logo{font-size:22px;font-weight:900;}
.logo span:first-child{background:var(--primary);color:#fff;padding:4px 10px;border-radius:8px;}
.logo span:last-child{color:#1e293b;}

/* Search - Glass Premium */
.search-box{max-width:1000px;margin:25px auto;padding:0 20px;}
.search-box .box{position:relative;}
.search-box input{width:100%;padding:18px 55px 18px 22px;border:2px solid rgba(37,99,235,.2);border-radius:18px;font-size:16px;background:rgba(255,255,255,.95);backdrop-filter:blur(15px);box-shadow:0 6px 25px rgba(37,99,235,.08);transition:.3s;font-weight:600;}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(37,99,235,.15);}
.search-box i{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:20px;}

/* Categories Grid - Premium 3D Cards */
.container{max-width:1400px;margin:0 auto;padding:25px 20px;}
.categories-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(min-width:480px){.categories-grid{grid-template-columns:repeat(3,1fr);gap:20px;}}
@media(min-width:768px){.categories-grid{grid-template-columns:repeat(4,1fr);gap:24px;}}
@media(min-width:1024px){.categories-grid{grid-template-columns:repeat(6,1fr);gap:26px;}}

.cat-card{background:rgba(255,255,255,.95);backdrop-filter:blur(15px);border-radius:25px;padding:20px;text-align:center;transition:all .4s cubic-bezier(.68,-0.55,.265,1.55);cursor:pointer;box-shadow:0 8px 30px rgba(37,99,235,.1);border:2px solid transparent;display:flex;flex-direction:column;justify-content:center;aspect-ratio:1/1.15;overflow:hidden;position:relative;}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:25px;padding:3px;background:var(--gradient);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:.4s;}
.cat-card:hover::before{opacity:1;}
.cat-card:hover{transform:translateY(-10px) scale(1.05);box-shadow:var(--glow);}

.cat-icon{width:75px;height:75px;margin:0 auto 15px;border-radius:50%;overflow:hidden;border:4px solid #fff;transition:.4s;flex-shrink:0;box-shadow:0 8px 25px rgba(37,99,235,.2);}
@media(min-width:768px){.cat-icon{width:95px;height:95px;}}
.cat-card:hover .cat-icon{transform:scale(1.15) rotate(8deg);box-shadow:0 0 35px rgba(37,99,235,.4);}
.cat-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cat-card h4{font-size:15px;font-weight:800;line-height:1.4;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#1e293b;}

/* Shimmer Loading Premium */
.shimmer{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(min-width:480px){.shimmer{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.shimmer{grid-template-columns:repeat(4,1fr);}}
.shimmer-item{background:linear-gradient(90deg,#dbeafe 25%,#eff6ff 50%,#dbeafe 75%);background-size:200% 100%;border-radius:25px;aspect-ratio:1/1.15;animation:shimmer 1.5s infinite;box-shadow:0 4px 20px rgba(37,99,235,.08);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.no-data{text-align:center;padding:100px 20px;}
.no-data i{font-size:70px;color:#cbd5e1;margin-bottom:20px;}
.no-data h3{font-size:20px;color:#64748b;margin-bottom:10px;font-weight:800;}
.no-data p{color:#94a3b8;font-weight:600;}

/* Footer */
footer{background:#fff;text-align:center;padding:35px 20px;color:#64748b;font-size:14px;font-weight:700;border-top:1px solid #e2e8f0;margin-top:50px;}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <div class="logo"><span>HUT</span><span>BAZ</span></div>
</div>

<!-- Search -->
<div class="search-box">
    <div class="box">
        <input type="text" id="catSearch" placeholder="Search Categories...">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</div>

<!-- Categories -->
<div class="container">
    <div class="shimmer" id="shimmerLoad">
        <div class="shimmer-item"></div><div class="shimmer-item"></div><div class="shimmer-item"></div><div class="shimmer-item"></div>
        <div class="shimmer-item"></div><div class="shimmer-item"></div>
    </div>
    <div class="categories-grid" id="categoryGrid" style="display:none;"></div>
    <div class="no-data" id="noData" style="display:none;">
        <i class="fa-solid fa-folder-open"></i>
        <h3>No Categories Found</h3>
        <p>Try searching with different keywords</p>
    </div>
</div>

<footer>© <span id="currentYear"></span> HUTBAZ. All Rights Reserved.</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allCategories = [];
const grid = document.getElementById('categoryGrid');
const shimmer = document.getElementById('shimmerLoad');
const noData = document.getElementById('noData');

// Auto Year
document.getElementById('currentYear').innerText = new Date().getFullYear();

// Load All Categories
async function loadAllCategories(){
    try{
        const catSnap = await getDocs(collection(db, "categories"));
        
        allCategories = catSnap.docs.map(doc => {
            return {id: doc.id,...doc.data()};
        });

        shimmer.style.display = 'none';
        grid.style.display = 'grid';
        renderCategories(allCategories);
    }catch(err){
        shimmer.style.display = 'none';
        noData.style.display = 'block';
        noData.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><h3>Error: ${err.message}</h3>`;
    }
}

function renderCategories(cats){
    if(cats.length === 0){
        grid.style.display = 'none';
        noData.style.display = 'block';
        return;
    }
    grid.style.display = 'grid';
    noData.style.display = 'none';

    grid.innerHTML = cats.map(data => {
        const slug = data.slug || data.id;
        return `
        <a href="category.html?slug=${slug}">
            <div class="cat-card">
                <div class="cat-icon">
                    <img src="${data.image}" alt="${data.name}" loading="lazy">
                </div>
                <h4>${data.name}</h4>
            </div>
        </a>
        `;
    }).join('');
}

// Fast Search Category
let searchTimeout;
document.getElementById('catSearch').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        const keyword = e.target.value.toLowerCase();
        const filtered = allCategories.filter(c => c.name.toLowerCase().includes(keyword));
        renderCategories(filtered);
    }, 200);
});

loadAllCategories();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Categories - BD SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary:#FF6B35;
    --primary-dark:#E85A1A;
    --accent:#FFA500;
    --gradient:linear-gradient(135deg,#FF6B35 0%,#FFA500 100%);
    --glow:0 0 35px rgba(255,107,53,.25);
    --bg:#FFF8F3;
    --card:rgba(255,255,255,0.95);
    --text:#1A1A1A;
    --muted:#64748B;
    --border:#FFE4D6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Noto Sans Bengali',sans-serif;}
body{background:linear-gradient(180deg,#FFF8F3 0%,#FFE4D6 100%);color:var(--text);overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* Header - Glass Premium Orange */
.header{
    position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(30px);z-index:1000;
    padding:20px 25px;display:flex;align-items:center;gap:18px;box-shadow:0 4px 30px rgba(255,107,53,.1);
    border-bottom:2px solid var(--border);
}
.back-btn{
    font-size:24px;color:var(--primary);transition:.3s;flex-shrink:0;display:flex;align-items:center;
    gap:10px;font-weight:900;padding:10px 18px;border-radius:15px;background:rgba(255,107,53,0.1);
}
.back-btn:hover{transform:scale(1.1) translateX(-3px);background:var(--primary);color:#fff;}
.logo{font-size:24px;font-weight:900;display:flex;gap:6px;}
.logo span:first-child{
    background:var(--gradient);color:#fff;padding:5px 12px;border-radius:10px;
    box-shadow:0 4px 15px rgba(255,107,53,0.3);
}
.logo span:last-child{color:var(--text);}

/* Search - Glass Premium */
.search-box{max-width:1000px;margin:30px auto;padding:0 20px;}
.search-box .box{position:relative;}
.search-box input{
    width:100%;padding:20px 60px 20px 25px;border:3px solid var(--border);border-radius:20px;font-size:16px;
    background:rgba(255,255,255,.95);backdrop-filter:blur(15px);box-shadow:0 10px 35px rgba(255,107,53,.1);
    transition:.3s;font-weight:700;
}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(255,107,53,.2);}
.search-box i{position:absolute;right:25px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:22px;}

/* Categories Grid - Premium 3D Cards */
.container{max-width:1500px;margin:0 auto;padding:30px 20px;}
.categories-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
@media(min-width:480px){.categories-grid{grid-template-columns:repeat(3,1fr);gap:22px;}}
@media(min-width:768px){.categories-grid{grid-template-columns:repeat(4,1fr);gap:26px;}}
@media(min-width:1024px){.categories-grid{grid-template-columns:repeat(6,1fr);gap:28px;}}

.cat-card{
    background:var(--card);backdrop-filter:blur(15px);border-radius:28px;padding:22px;text-align:center;
    transition:all .4s cubic-bezier(.68,-0.55,.265,1.55);cursor:pointer;
    box-shadow:0 10px 40px rgba(255,107,53,.12);border:2px solid transparent;
    display:flex;flex-direction:column;justify-content:center;aspect-ratio:1/1.15;overflow:hidden;
    position:relative;
}
.cat-card::before{
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:28px;padding:3px;
    background:var(--gradient);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:.4s;
}
.cat-card:hover::before{opacity:1;}
.cat-card:hover{transform:translateY(-12px) scale(1.06);box-shadow:var(--glow);}

.cat-icon{
    width:80px;height:80px;margin:0 auto 18px;border-radius:50%;overflow:hidden;border:4px solid #fff;
    transition:.4s;flex-shrink:0;box-shadow:0 10px 30px rgba(255,107,53,.25);
}
@media(min-width:768px){.cat-icon{width:100px;height:100px;}}
.cat-card:hover .cat-icon{transform:scale(1.2) rotate(10deg);box-shadow:0 0 45px rgba(255,107,53,.5);}
.cat-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cat-card h4{
    font-size:16px;font-weight:900;line-height:1.4;word-break:break-word;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text);
}

/* Shimmer Loading Premium */
.shimmer{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
@media(min-width:480px){.shimmer{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.shimmer{grid-template-columns:repeat(4,1fr);}}
.shimmer-item{
    background:linear-gradient(90deg,#FFE4D6 25%,#FFF0E6 50%,#FFE4D6 75%);
    background-size:200% 100%;border-radius:28px;aspect-ratio:1/1.15;animation:shimmer 1.5s infinite;
    box-shadow:0 6px 25px rgba(255,107,53,.1);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.no-data{text-align:center;padding:120px 20px;}
.no-data i{font-size:80px;color:rgba(255,107,53,0.2);margin-bottom:25px;}
.no-data h3{font-size:22px;color:var(--text);margin-bottom:12px;font-weight:900;}
.no-data p{color:var(--muted);font-weight:700;}

/* Footer */
footer{
    background:var(--card);text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;
    font-weight:800;border-top:2px solid var(--border);margin-top:60px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <div class="logo"><span>BD</span><span>SHOP</span></div>
</div>

<!-- Search -->
<div class="search-box">
    <div class="box">
        <input type="text" id="catSearch" placeholder="Search Categories...">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</div>

<!-- Categories -->
<div class="container">
    <div class="shimmer" id="shimmerLoad">
        <div class="shimmer-item"></div><div class="shimmer-item"></div><div class="shimmer-item"></div><div class="shimmer-item"></div>
        <div class="shimmer-item"></div><div class="shimmer-item"></div>
    </div>
    <div class="categories-grid" id="categoryGrid" style="display:none;"></div>
    <div class="no-data" id="noData" style="display:none;">
        <i class="fa-solid fa-folder-open"></i>
        <h3>No Categories Found</h3>
        <p>Try searching with different keywords</p>
    </div>
</div>

<footer>© <span id="currentYear"></span> BD SHOP. All Rights Reserved.</footer> <!-- CHANGED -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allCategories = [];
const grid = document.getElementById('categoryGrid');
const shimmer = document.getElementById('shimmerLoad');
const noData = document.getElementById('noData');

// Auto Year
document.getElementById('currentYear').innerText = new Date().getFullYear();

// Load All Categories
async function loadAllCategories(){
    try{
        const catSnap = await getDocs(collection(db, "categories"));
        
        allCategories = catSnap.docs.map(doc => {
            return {id: doc.id,...doc.data()};
        });

        shimmer.style.display = 'none';
        grid.style.display = 'grid';
        renderCategories(allCategories);
    }catch(err){
        shimmer.style.display = 'none';
        noData.style.display = 'block';
        noData.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><h3>Error: ${err.message}</h3>`;
    }
}

function renderCategories(cats){
    if(cats.length === 0){
        grid.style.display = 'none';
        noData.style.display = 'block';
        return;
    }
    grid.style.display = 'grid';
    noData.style.display = 'none';

    grid.innerHTML = cats.map(data => {
        const slug = data.slug || data.id;
        return `
        <a href="category.html?slug=${slug}">
            <div class="cat-card">
                <div class="cat-icon">
                    <img src="${data.image}" alt="${data.name}" loading="lazy">
                </div>
                <h4>${data.name}</h4>
            </div>
        </a>
        `;
    }).join('');
}

// Fast Search Category
let searchTimeout;
document.getElementById('catSearch').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        const keyword = e.target.value.toLowerCase();
        const filtered = allCategories.filter(c => c.name.toLowerCase().includes(keyword));
        renderCategories(filtered);
    }, 200);
});

loadAllCategories();
</script>
</body>
</html>
